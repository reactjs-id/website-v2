on:
  push:
    branches: [trunk]
  pull_request:
    types: [opened, synchronize]

name: CI

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: yarn install --frozen-lockfile
      - uses: actions/cache@v4
        id: cache-build
        with:
          path: '.'
          key: ${{ github.sha }}

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/cache@v4
        id: restore-build
        with:
          path: '.'
          key: ${{ github.sha }}
      - run: yarn validate
        env:
          CI: true
